name: Sync Question Bank

on:
  push:
    paths:
      - 'questions.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Parse XLSX to JSON
        run: python scripts/parse_xlsx.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add questions.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: update questions.json from XLSX"
          git push
