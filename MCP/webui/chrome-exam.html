<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome 模擬器 · 十步操作考題</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .chrome{border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.15);width:100%;max-width:900px;background:#fff}
    .title-bar{background:#dee1e6;padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #c1c6cd}
    .win-btn{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer}
    .win-btn.close{background:#ed6a5e}
    .win-btn.min{background:#f5bd4f}
    .win-btn.max{background:#61c554}
    .tab-bar{background:#dee1e6;padding:6px 8px 0;display:flex;align-items:center;gap:4px;border-bottom:1px solid #c1c6cd;overflow-x:auto}
    .tab{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px 8px 0 0;font-size:13px;cursor:pointer;background:#c9cdd4;color:#444;white-space:nowrap;max-width:160px;transition:.15s}
    .tab.active{background:#fff;color:#222;font-weight:600}
    .tab .close-tab{margin-left:2px;width:16px;height:16px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;color:#888}
    .tab .close-tab:hover{background:rgba(0,0,0,.1);color:#333}
    .tab-add{width:28px;height:28px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:18px;color:#555;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .tab-add:hover{background:rgba(0,0,0,.08)}
    .nav-bar{background:#fff;padding:6px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #e5e7eb;flex-wrap:wrap}
    .nav-btn{width:30px;height:30px;border:none;border-radius:50%;background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#555;flex-shrink:0}
    .nav-btn:hover{background:#f3f4f6}
    .nav-btn:disabled{opacity:.3;cursor:not-allowed}
    .address-bar{flex:1;min-width:100px;display:flex;align-items:center;background:#f3f4f6;border-radius:20px;padding:0 12px;border:1px solid #e5e7eb;height:30px}
    .address-bar input{flex:1;border:none;background:transparent;outline:none;font-size:13px;color:#333;width:100%}
    .address-bar .lock{color:#888;font-size:12px;margin-right:4px}
    .menu-btn{width:30px;height:30px;border:none;border-radius:50%;background:transparent;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:#555;position:relative}
    .menu-btn:hover{background:#f3f4f6}
    .menu-dropdown{position:absolute;top:36px;right:0;background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);border:1px solid #e5e7eb;min-width:200px;z-index:50;display:none;padding:4px 0}
    .menu-dropdown.show{display:block}
    .menu-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:#333;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
    .menu-item:hover{background:#f3f4f6}
    .menu-divider{height:1px;background:#e5e7eb;margin:4px 0}
    .content-area{min-height:320px;background:#fff;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;position:relative}
    .content-area.sim-google{background:linear-gradient(135deg,#fff,#f8f9fa)}
    .content-area.sim-youtube{background:#111;color:#fff}
    .bottom-bar{background:#f8f9fa;border-top:1px solid #e5e7eb;padding:10px 16px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px}
    .step-info{font-size:14px;font-weight:600;color:#1e40af}
    .score{font-size:14px;color:#059669;font-weight:600}
    .timer{font-size:14px;color:#6b7280}
    .msg{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 14px;font-size:13px;color:#1e40af;text-align:center;max-width:500px;margin:0 auto}
    .msg.done{background:#ecfdf5;border-color:#6ee7b7;color:#047857}
    .msg.fail{background:#fef2f2;border-color:#fca5a5;color:#b91c1c}
    .success-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600;background:#d1fae5;color:#047857}
    .particle{position:fixed;pointer-events:none;font-size:24px;animation:popUp 1s ease-out forwards;z-index:999}
    @keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.3)}}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100}
    .modal-overlay.show{display:flex}
    .modal-box{background:#fff;border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
    .modal-box h2{font-size:24px;font-weight:700;margin-bottom:8px}
    .modal-box p{font-size:14px;color:#6b7280;margin-bottom:16px}
    .restart-btn{padding:8px 24px;border:none;border-radius:8px;background:#3b82f6;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
    .restart-btn:hover{background:#2563eb}
    .res-btn{display:inline-flex;padding:5px 14px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin:4px}
    .res-btn.green{background:#059669;color:#fff}
    .res-btn.green:hover{background:#047857}
    .res-btn.outline{background:transparent;border:1px solid #d1d5db;color:#6b7280}
    .res-btn.outline:hover{background:#f3f4f6}
  </style>
</head>
<body>

<!-- completion modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div style="font-size:48px;margin-bottom:12px" id="modalEmoji">🎉</div>
    <h2 id="modalTitle">測驗完成！</h2>
    <p id="modalDesc">你的成績</p>
    <div style="font-size:42px;font-weight:800;color:#059669;margin-bottom:8px" id="modalScore">10/10</div>
    <div style="font-size:14px;color:#6b7280;margin-bottom:16px" id="modalTime">花費時間：00:45</div>
    <button class="restart-btn" onclick="restart()">再考一次</button>
  </div>
</div>

<div class="chrome" id="chromeApp">
  <!-- title bar -->
  <div class="title-bar">
    <button class="win-btn close" onclick="clickTitleBtn('close')"></button>
    <button class="win-btn min" onclick="clickTitleBtn('min')"></button>
    <button class="win-btn max" onclick="clickTitleBtn('max')"></button>
    <span style="font-size:12px;color:#555;margin-left:8px" id="incogBadge"></span>
  </div>

  <!-- tab bar -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- nav bar -->
  <div class="nav-bar">
    <button class="nav-btn" id="btnBack" onclick="navClick('back')" disabled>◀</button>
    <button class="nav-btn" id="btnFwd" onclick="navClick('fwd')" disabled>▶</button>
    <button class="nav-btn" id="btnReload" onclick="navClick('reload')">⟳</button>
    <button class="nav-btn" id="btnStar" onclick="navClick('bookmark')" style="color:#888">☆</button>
    <div class="address-bar" onclick="focusAddress()">
      <span class="lock">🔒</span>
      <input type="text" id="addressInput" placeholder="搜尋或輸入網址" readonly
             onfocus="this.readOnly=false;this.select()"
             onblur="this.readOnly=true"
             onkeydown="if(event.key==='Enter')addressGo()">
    </div>
    <div style="position:relative">
      <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">⋮</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button class="menu-item" onclick="menuAction('newTab')">➕ 新分頁</button>
        <button class="menu-item" onclick="menuAction('incognito')">🕶️ 無痕模式</button>
        <div class="menu-divider"></div>
        <button class="menu-item" onclick="menuAction('history')">📋 歷史記錄</button>
        <button class="menu-item" onclick="menuAction('downloads')">⬇️ 下載內容</button>
        <div class="menu-divider"></div>
        <div style="padding:4px 16px;font-size:12px;color:#888">🔍 縮放</div>
        <div style="display:flex;align-items:center;gap:4px;padding:2px 16px 6px">
          <button class="res-btn outline" onclick="menuAction('zoomOut')" style="font-size:16px">−</button>
          <span style="font-size:13px;min-width:48px;text-align:center" id="zoomLevel">100%</span>
          <button class="res-btn outline" onclick="menuAction('zoomIn')" style="font-size:16px">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- content area -->
  <div class="content-area" id="contentArea">
    <div id="pageContent" style="width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px">
      <div id="examIntro">
        <div style="font-size:48px">🌐</div>
        <h2 style="font-size:22px;font-weight:700;color:#1e293b;margin-top:8px">Chrome 模擬器操作考</h2>
        <p style="color:#6b7280;margin-top:4px;font-size:14px">照著步驟操作，系統會自動評分</p>
        <button class="restart-btn" style="margin-top:12px" onclick="startExam()">開始測驗</button>
      </div>
    </div>
  </div>

  <!-- bottom bar -->
  <div class="bottom-bar">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <div class="step-info" id="stepInfo">準備開始</div>
      <div id="stepProgress" style="display:flex;gap:3px"></div>
    </div>
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
      <div class="score" id="scoreDisplay">✅ 0/10</div>
      <div class="timer" id="timerDisplay">⏱ 00:00</div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
const TABS_INIT = [
  {id:'t1',title:'新分頁',url:'chrome://newtab',active:true}
];
let tabs = JSON.parse(JSON.stringify(TABS_INIT));
let tabCounter = 1;
let currentStep = 0; // 0 = not started
let score = 0;
let timerSec = 0;
let timerInterval = null;
let examStarted = false;
let completed = false;
let incognito = false;
let zoom = 100;
let history = ['chrome://newtab'];
let historyIdx = 0;
let bookmarked = false;

const steps = [
  {id:1,desc:'點擊「＋」開啟一個新分頁',check:()=>tabs.length===2&&currentStep===1,autoNext:false},
  {id:2,desc:'在網址列輸入 https://www.google.com 並按 Enter',check:()=>getActiveTab().url==='https://www.google.com',autoNext:false},
  {id:3,desc:'在 Google 搜尋框輸入「小學資訊教育」並點擊搜尋',check:()=>searched&&currentStep===3,autoNext:false},
  {id:4,desc:'點擊 ◀ 上一頁按鈕',check:()=>historyIdx<history.length-1,autoNext:false,noAutoAdvance:true},
  {id:5,desc:'點擊 ⟳ 重新整理按鈕',check:()=>reloaded,autoNext:false},
  {id:6,desc:'點擊 ☆ 將此頁加入書籤',check:()=>bookmarked,autoNext:false},
  {id:7,desc:'點擊 ⋮ 選單 → 選擇「無痕模式」',check:()=>incognito,autoNext:false},
  {id:8,desc:'點擊 ⋮ 選單 → 將縮放改為 150%',check:()=>zoom===150,autoNext:false},
  {id:9,desc:'開新分頁並前往 https://www.youtube.com',check:()=>{const t=getActiveTab();return t.url==='https://www.youtube.com'&&tabs.length>=3},autoNext:false},
  {id:10,desc:'點擊目前分頁的 ✕ 關閉分頁',check:()=>tabs.length<3,autoNext:false}
];

let searched = false;
let reloaded = false;

function getActiveTab(){return tabs.find(t=>t.active)||tabs[0]}
function renderTabs(){
  const bar=document.getElementById('tabBar');
  bar.innerHTML=tabs.map(t=>`<div class="tab${t.active?' active':''}" onclick="switchTab('${t.id}')">${t.icon?t.icon+' ':'🌐 '}${t.title.length>15?t.title.slice(0,15)+'…':t.title}<button class="close-tab" onclick="event.stopPropagation();closeTab('${t.id}')">✕</button></div>`).join('')+
    '<button class="tab-add" onclick="newTab()">+</button>';
}
function switchTab(id){
  if(completed)return;
  tabs.forEach(t=>t.active=t.id===id);
  renderTabs();updateAddress();renderContent();
}
function newTab(){
  if(completed)return;
  tabCounter++;const id='t'+(tabCounter+10);
  tabs.forEach(t=>t.active=false);
  tabs.push({id,title:'新分頁',url:'chrome://newtab',active:true,icon:'🌐'});
  renderTabs();updateAddress();renderContent();
  if(currentStep===1&&tabs.length===2)stepDone();
}
function closeTab(id){
  if(completed)return;
  const idx=tabs.findIndex(t=>t.id===id);if(idx<0)return;
  if(tabs.length<=1){showMsg('至少要保留一個分頁','fail');return}
  const wasActive=tabs[idx].active;
  tabs.splice(idx,1);
  if(wasActive&&tabs[idx]||wasActive&&tabs[idx-1]){(tabs[idx]||tabs[idx-1]).active=true}
  else if(wasActive)tabs[0].active=true;
  renderTabs();updateAddress();renderContent();
  if(currentStep===10&&tabs.length<3)stepDone();
}
function updateAddress(){
  const t=getActiveTab();const inp=document.getElementById('addressInput');
  inp.value=t.url;inp.readOnly=true;
}
function renderContent(){
  const t=getActiveTab();
  const el=document.getElementById('pageContent');
  const area=document.getElementById('contentArea');
  area.className='content-area';
  if(t.url==='https://www.google.com'){
    area.classList.add('sim-google');
    el.innerHTML=`
      <div style="font-size:64px;margin-bottom:4px">🔍</div>
      <div style="font-size:20px;font-weight:600;color:#333;margin-bottom:8px">Google</div>
      <div style="display:flex;gap:4px;width:100%;max-width:400px">
        <input type="text" id="googleSearch" placeholder="搜尋 Google 或輸入網址"
               style="flex:1;padding:8px 14px;border:1px solid #ddd;border-radius:20px;outline:none;font-size:14px">
        <button onclick="googleSearch()" style="padding:8px 16px;border:none;border-radius:20px;background:#3b82f6;color:#fff;font-size:13px;cursor:pointer">搜尋</button>
      </div>`;
    const gs=document.getElementById('googleSearch');
    if(gs)gs.addEventListener('keydown',e=>{if(e.key==='Enter')googleSearch()});
  }else if(t.url==='https://www.youtube.com'){
    area.classList.add('sim-youtube');
    el.innerHTML=`
      <div style="font-size:56px">▶️</div>
      <div style="font-size:22px;font-weight:700">YouTube</div>
      <div style="color:#aaa;font-size:13px">影片 · 音樂 · 直播</div>`;
  }else if(t.url==='chrome://newtab'){
    area.className='content-area';
    el.innerHTML=`
      <div style="font-size:48px;cursor:pointer" onclick="if(currentStep===0&&!examStarted)startExam()">🌐</div>
      <div style="font-size:16px;color:#6b7280">新分頁</div>
      ${examStarted?'':'<button class="restart-btn" onclick="startExam()">開始測驗</button>'}
      ${incognito?'<div style="padding:4px 12px;border-radius:999px;background:#fef3c7;color:#92400e;font-size:12px">🕶️ 無痕模式已啟用</div>':''}
      <div style="font-size:12px;color:#aaa">${zoom!==100?'縮放 '+zoom+'%':''}</div>`;
  }else if(t.url==='about:blank'){
    el.innerHTML=``;
  }else{
    area.className='content-area';
    el.innerHTML=`<div style="font-size:40px;margin-bottom:8px">📄</div><div style="color:#6b7280;font-size:14px">${t.url}</div>`;
  }
  if(currentStep===3&&t.url==='https://www.google.com'){
    setTimeout(()=>{const g=document.getElementById('googleSearch');if(g)g.focus()},100);
  }
}
function navClick(action){
  if(completed)return;
  const t=getActiveTab();
  if(action==='back'){
    if(historyIdx>0){
      historyIdx--;t.url=history[historyIdx];
      t.title=t.url.includes('google')?'Google':t.url.includes('youtube')?'YouTube':t.url;
      renderTabs();updateAddress();renderContent();updateNavBtns();
      if(currentStep===4)stepDone();
    }
  }else if(action==='fwd'){
    if(historyIdx<history.length-1){
      historyIdx++;t.url=history[historyIdx];
      t.title=t.url.includes('google')?'Google':t.url.includes('youtube')?'YouTube':t.url;
      renderTabs();updateAddress();renderContent();updateNavBtns();
    }
  }else if(action==='reload'){
    reloaded=true;stepDone(5);
  }else if(action==='bookmark'){
    bookmarked=true;stepDone(6);
    document.getElementById('btnStar').style.color='#f59e0b';
    document.getElementById('btnStar').textContent='★';
  }
}
function updateNavBtns(){
  document.getElementById('btnBack').disabled=historyIdx<=0;
  document.getElementById('btnFwd').disabled=historyIdx>=history.length-1;
}
function addressGo(){
  if(completed)return;
  const inp=document.getElementById('addressInput');const val=inp.value.trim();
  if(!val)return;
  const t=getActiveTab();
  let url=val;
  if(!url.startsWith('http'))url='https://'+url;
  if(currentStep===2){
    if(url==='https://www.google.com'||url==='https://google.com'||val==='www.google.com'||val==='google.com'){
      url='https://www.google.com';t.url=url;t.title='Google';history.push(url);historyIdx=history.length-1;
      renderTabs();updateAddress();renderContent();updateNavBtns();
      stepDone();return;
    }
  }
  if(currentStep===9){
    if(url==='https://www.youtube.com'||url==='https://youtube.com'||val==='www.youtube.com'||val==='youtube.com'){
      url='https://www.youtube.com';t.url=url;t.title='YouTube';history.push(url);historyIdx=history.length-1;
      renderTabs();updateAddress();renderContent();updateNavBtns();
      if(tabs.length>=3)stepDone();
      else showMsg('需要先開新分頁！','fail');
      return;
    }
  }
  t.url=url;t.title=url.replace('https://','').split('/')[0];history.push(url);historyIdx=history.length-1;
  renderTabs();updateAddress();renderContent();updateNavBtns();
}
function focusAddress(){
  const inp=document.getElementById('addressInput');
  inp.readOnly=false;inp.focus();inp.select();
}
function googleSearch(){
  if(completed)return;
  const inp=document.getElementById('googleSearch');
  if(!inp||!inp.value.trim())return;
  searched=true;
  if(currentStep===3)stepDone();
  showMsg(`🔍 搜尋「${inp.value}」完成`,'done');
}
function toggleMenu(){
  document.getElementById('menuDropdown').classList.toggle('show');
}
function menuAction(action){
  document.getElementById('menuDropdown').classList.remove('show');
  if(completed)return;
  if(action==='newTab')newTab();
  else if(action==='incognito'){
    incognito=true;
    document.getElementById('incogBadge').textContent='🕶️ 無痕模式';
    document.querySelector('.title-bar').style.background='#374151';
    document.querySelector('.tab-bar').style.background='#374151';
    if(currentStep===7)stepDone();
  }else if(action==='zoomIn'){
    zoom=Math.min(zoom+25,200);
    document.getElementById('chromeApp').style.transform=`scale(${zoom/100})`;
    document.getElementById('chromeApp').style.transformOrigin='top center';
    document.getElementById('zoomLevel').textContent=zoom+'%';
    if(zoom===150&&currentStep===8)stepDone();
  }else if(action==='zoomOut'){
    zoom=Math.max(zoom-25,50);
    document.getElementById('chromeApp').style.transform=`scale(${zoom/100})`;
    document.getElementById('chromeApp').style.transformOrigin='top center';
    document.getElementById('zoomLevel').textContent=zoom+'%';
  }
}
function clickTitleBtn(type){
  if(completed)return;
  if(type==='close')showMsg('這是模擬器，無法真正關閉 😄','fail');
}
function showMsg(text,type='info'){
  const el=document.getElementById('stepInfo');
  el.textContent=text;
  el.className='step-info '+(type==='done'?'text-emerald-600':type==='fail'?'text-red-600':'text-blue-600');
  if(type==='done'){
    spawnParticle('✅');
  }
}
function spawnParticle(e){
  for(let i=0;i<3;i++){
    const p=document.createElement('div');p.className='particle';p.textContent=e;
    p.style.left=(Math.random()*60+20)+'vw';p.style.top=(Math.random()*30+30)+'vh';
    p.style.animationDuration=(.6+Math.random()*.4)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1200);
  }
}

// ── STEPS ──
function stepDone(stepNum){
  const s=stepNum||currentStep;
  if(s<1||s>10||completed)return;
  if(s>currentStep+1)return;
  if(s<=score)return;
  score=s;currentStep=s;
  const sd=document.getElementById('scoreDisplay');
  sd.textContent=`✅ ${score}/10`;
  sd.style.color='#059669';sd.style.transition='none';
  setTimeout(()=>sd.style.color='',500);
  spawnParticle('✅');
  if(score>=10)finishExam();
  else showStepHint(s+1);
}
function showStepHint(n){
  const st=steps.find(s=>s.id===n);if(!st)return;
  document.getElementById('stepInfo').textContent=`❓ 第 ${n} 題：${st.desc}`;
  document.getElementById('stepInfo').className='step-info';
  renderStepProgress();
}
function renderStepProgress(){
  const el=document.getElementById('stepProgress');
  el.innerHTML='';
  for(let i=1;i<=10;i++){
    const d=document.createElement('span');
    d.style.cssText=`width:16px;height:16px;border-radius:50%;font-size:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:600;transition:.2s`;
    if(i<=score){d.style.background='#059669';d.style.color='#fff';d.textContent='✓';}
    else if(i===currentStep+1||(i===1&&currentStep===0)){d.style.background='#3b82f6';d.style.color='#fff';d.textContent=i;}
    else{d.style.background='#e5e7eb';d.style.color='#9ca3af';d.textContent=i;}
    el.appendChild(d);
  }
}
function startExam(){
  if(examStarted)return;
  examStarted=true;currentStep=1;score=0;timerSec=0;
  document.getElementById('examIntro').style.display='none';
  timerInterval=setInterval(()=>{timerSec++;updateTimer()},1000);
  renderStepProgress();
  showStepHint(1);
  document.getElementById('scoreDisplay').textContent='✅ 0/10';
  document.getElementById('incogBadge').textContent='';
  document.querySelector('.title-bar').style.background='#dee1e6';
  document.querySelector('.tab-bar').style.background='#dee1e6';
  renderContent();
}
function updateTimer(){
  const m=String(Math.floor(timerSec/60)).padStart(2,'0');
  const s=String(timerSec%60).padStart(2,'0');
  document.getElementById('timerDisplay').textContent=`⏱ ${m}:${s}`;
}
function finishExam(){
  completed=true;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  const m=String(Math.floor(timerSec/60)).padStart(2,'0');
  const s=String(timerSec%60).padStart(2,'0');
  document.getElementById('modalEmoji').textContent=score===10?'🎉':score>=7?'👍':'💪';
  document.getElementById('modalTitle').textContent=score===10?'完美過關！':score>=7?'不錯喔！':'再加油！';
  document.getElementById('modalScore').textContent=`${score}/10`;
  document.getElementById('modalTime').textContent=`花費時間：${m}:${s}`;
  document.getElementById('modalOverlay').classList.add('show');
}
function restart(){
  completed=false;examStarted=false;currentStep=0;score=0;timerSec=0;searched=false;reloaded=false;bookmarked=false;
  incognito=false;zoom=100;history=['chrome://newtab'];historyIdx=0;
  tabs=JSON.parse(JSON.stringify(TABS_INIT));tabCounter=1;
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('scoreDisplay').textContent='✅ 0/10';
  document.getElementById('timerDisplay').textContent='⏱ 00:00';
  document.getElementById('stepInfo').textContent='準備開始';
  document.getElementById('stepInfo').className='step-info';
  document.getElementById('btnStar').textContent='☆';document.getElementById('btnStar').style.color='#888';
  document.getElementById('chromeApp').style.transform='';document.getElementById('zoomLevel').textContent='100%';
  document.getElementById('incogBadge').textContent='';
  document.querySelector('.title-bar').style.background='#dee1e6';
  document.querySelector('.tab-bar').style.background='#dee1e6';
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  renderTabs();updateAddress();renderContent();updateNavBtns();
  document.getElementById('examIntro').style.display='flex';
}

// init
renderTabs();updateAddress();updateNavBtns();

// close menu on outside click
document.addEventListener('click',function(e){
  const dd=document.getElementById('menuDropdown');
  const mb=document.getElementById('menuBtn');
  if(dd.classList.contains('show')&&!dd.contains(e.target)&&!mb.contains(e.target))dd.classList.remove('show');
});
</script>
