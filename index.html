<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMSS 三年級科學 · 模擬測驗（隨機題序／自動批改）</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'Microsoft JhengHei', 微軟正黑體, sans-serif; }
        body { background: #d0deeb; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 12px; }

        /* ─── Login Panel ─── */
        .login-container {
            background: white; width: 460px; max-width: 96%; padding: 40px 36px;
            border-radius: 48px; box-shadow: 0 30px 50px rgba(0,20,40,0.25);
            text-align: center; transition: 0.2s;
        }
        .login-container h2 {
            color: #0b3b5c; font-size: 2rem; margin-bottom: 32px; font-weight: 600;
            border-left: 12px solid #1e6fd9; padding-left: 20px; text-align: left; cursor: pointer;
        }
        .login-field { margin-bottom: 24px; text-align: left; }
        .login-field label {
            display: block; font-size: 1.2rem; color: #1a4e6f;
            font-weight: 600; margin-bottom: 6px; margin-left: 8px;
        }
        .login-field select, .login-field input {
            width: 100%; padding: 16px 20px; font-size: 1.2rem;
            border: 2px solid #b8cadc; border-radius: 60px; background: white;
            transition: 0.15s; outline: none;
        }
        .login-field select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%231e6fd9" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat; background-position: right 20px center; background-size: 20px;
        }
        .login-field input:focus, .login-field select:focus {
            border-color: #1e6fd9; box-shadow: 0 0 0 4px rgba(30,111,217,0.15);
        }
        .btn-login {
            background: #1e6fd9; color: white; font-size: 1.6rem; font-weight: 600;
            padding: 16px 30px; border: none; border-radius: 60px; width: 100%;
            margin-top: 28px; cursor: pointer; box-shadow: 0 10px 20px rgba(30,111,217,0.4);
            transition: 0.1s;
        }
        .btn-login:hover { background: #0b5bbb; transform: scale(1.01); }
        .error-msg { color: #c44536; margin-top: 20px; font-size: 1.1rem; }

        /* ─── Admin Panel ─── */
        #adminPanel {
            width: 1400px; max-width: 100%; height: 95vh; background: white;
            border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: none; flex-direction: column; overflow: hidden;
        }
        .admin-header {
            background: linear-gradient(135deg, #0b3b5c, #1a4e6f); color: white;
            padding: 16px 28px; display: flex; justify-content: space-between; align-items: center;
        }
        .admin-header h1 { font-size: 1.5rem; font-weight: 600; }
        .admin-body { display: flex; flex: 1; min-height: 0; background: #fafcff; }
        .admin-sidebar {
            width: 200px; background: #f0f4f8; border-right: 2px solid #bdcbd8;
            padding: 20px 10px; display: flex; flex-direction: column; gap: 8px;
        }
        .admin-tab {
            padding: 14px 18px; font-size: 1.1rem; font-weight: 600;
            border: none; border-radius: 14px; cursor: pointer; text-align: left;
            background: transparent; color: #1a4e6f; transition: 0.1s;
        }
        .admin-tab:hover { background: #dce6f0; }
        .admin-tab.active { background: #1e6fd9; color: white; }
        .admin-content { flex: 1; padding: 24px 30px; overflow-y: auto; }
        .admin-tab-content { display: none; }
        .admin-tab-content.active { display: block; }

        /* ─── Admin: Question Bank ─── */
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .toolbar select, .toolbar input, .toolbar button {
            padding: 10px 18px; font-size: 1rem; border-radius: 30px; border: 2px solid #b8cadc;
        }
        .toolbar button {
            background: #1e6fd9; color: white; border: none; cursor: pointer; font-weight: 600;
        }
        .toolbar button:hover { background: #0b5bbb; }
        .toolbar .btn-danger { background: #c44536; }
        .toolbar .btn-danger:hover { background: #a03020; }
        .toolbar .btn-success { background: #2a9d8f; }
        .toolbar .btn-success:hover { background: #1f7e72; }

        .qb-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
        .qb-table th {
            background: #e8eef5; padding: 12px 10px; text-align: left;
            border-bottom: 2px solid #bdcbd8; position: sticky; top: 0;
        }
        .qb-table td { padding: 10px; border-bottom: 1px solid #dde5ed; vertical-align: middle; }
        .qb-table tr:hover { background: #f5f8fc; }
        .type-badge {
            display: inline-block; padding: 3px 12px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; color: white;
        }
        .type-image-choice { background: #9b59b6; }
        .type-text-choice { background: #2980b9; }
        .type-short-answer { background: #27ae60; }
        .type-fill-blank { background: #e67e22; }
        .preview-text { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ─── Admin: Modal / Form ─── */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal {
            background: white; border-radius: 32px; padding: 30px; width: 700px;
            max-width: 96%; max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 50px rgba(0,0,0,0.3);
        }
        .modal h3 { font-size: 1.5rem; color: #0b3b5c; margin-bottom: 20px; }
        .modal-field { margin-bottom: 16px; }
        .modal-field label { display: block; font-weight: 600; margin-bottom: 4px; color: #1a4e6f; }
        .modal-field input, .modal-field select, .modal-field textarea {
            width: 100%; padding: 12px 16px; font-size: 1rem;
            border: 2px solid #b8cadc; border-radius: 16px; outline: none;
        }
        .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
            border-color: #1e6fd9; box-shadow: 0 0 0 4px rgba(30,111,217,0.15);
        }
        .modal-field textarea { min-height: 60px; resize: vertical; }
        .modal-option-row {
            display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
        }
        .modal-option-row input { flex: 1; }
        .modal-option-row .btn-remove-opt {
            background: #c44536; color: white; border: none; width: 36px;
            height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;
        }
        .modal-btns { display: flex; gap: 12px; margin-top: 20px; justify-content: flex-end; }
        .modal-btns button {
            padding: 12px 28px; font-size: 1rem; border-radius: 30px;
            border: none; cursor: pointer; font-weight: 600;
        }
        .modal-btns .btn-primary { background: #1e6fd9; color: white; }
        .modal-btns .btn-secondary { background: #e0e5ec; color: #1e2b37; }

        /* ─── Admin: Test Config ─── */
        .config-section { background: #f9fcff; border: 1px solid #cfdeed; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .config-section h4 { color: #0b3b5c; margin-bottom: 12px; }
        .auto-row { display: flex; gap: 16px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .auto-row label { min-width: 100px; font-weight: 600; }
        .auto-row input[type="number"] { width: 80px; padding: 8px 12px; border: 2px solid #b8cadc; border-radius: 16px; font-size: 1rem; text-align: center; }
        .q-check-list { max-height: 400px; overflow-y: auto; border: 1px solid #cfdeed; border-radius: 16px; padding: 12px; }
        .q-check-item { padding: 8px 12px; border-bottom: 1px solid #eef3f8; display: flex; align-items: center; gap: 10px; }
        .q-check-item label { flex: 1; cursor: pointer; }

        /* ─── Admin: Results ─── */
        .results-summary { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card {
            background: #f9fcff; border: 1px solid #cfdeed; border-radius: 20px;
            padding: 16px 24px; text-align: center; min-width: 120px;
        }
        .stat-card .num { font-size: 2rem; font-weight: 700; color: #1e6fd9; }
        .stat-card .label { font-size: 0.9rem; color: #5b7a94; }

        /* ─── Test App (student) ─── */
        .app {
            width: 1400px; max-width: 100%; height: 95vh; background: white;
            border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: none; flex-direction: column; overflow: hidden;
        }
        .header {
            padding: 16px 28px; background: linear-gradient(135deg, #0b3b5c, #1a4e6f);
            color: white; display: flex; justify-content: space-between;
            align-items: center; font-size: 1.3rem; flex-wrap: wrap;
        }
        .student-badge {
            background: #143e57; padding: 8px 22px; border-radius: 40px;
            font-size: 1.2rem; font-weight: 500;
        }
        .timer {
            background: #102a37; padding: 8px 24px; border-radius: 60px;
            font-size: 2rem; font-weight: 700; font-family: 'Courier New', monospace;
            box-shadow: inset 0 0 0 2px #3e7a9b; color: #f8ffb0;
        }
        .main { display: flex; flex: 1; min-height: 0; background: #fafcff; }
        .sidebar {
            width: 200px; background: #f0f4f8; border-right: 2px solid #bdcbd8;
            padding: 15px 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        }
        .color-legend {
            background: #ffffffcc; border-radius: 40px; padding: 12px 8px;
            font-size: 1rem; font-weight: 500; display: flex; flex-wrap: wrap;
            justify-content: center; gap: 15px; border: 1px solid #b0c4d9; backdrop-filter: blur(2px);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 24px; height: 24px; border-radius: 8px; }
        .green-bg { background-color: #2a9d8f; }
        .blue-bg { background-color: #1e6fd9; }
        .gray-bg { background-color: #e0e5ec; border: 1px solid #aaa; }
        .question-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .q-btn {
            width: 46px; height: 46px; border-radius: 18px; border: none;
            font-size: 1.3rem; font-weight: 700; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .q-btn.todo { background-color: #e0e5ec; color: #1e2b37; }
        .q-btn.done { background-color: #2a9d8f; color: white; }
        .q-btn.current { background-color: #1e6fd9; color: white; transform: scale(1.05); border: 2px solid white; }
        .q-btn:hover:not(.current) { filter: brightness(0.96); }
        .content { flex: 1; padding: 24px 30px; overflow-y: auto; background: white; }
        .question-panel { max-width: 900px; margin: 0 auto; }
        .question-body {
            font-size: 1.2rem; line-height: 1.6; color: #1f3a4c;
            background: #f9fcff; padding: 30px 28px; border-radius: 28px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02), inset 0 0 0 1px #cfdeed;
        }
        .question-body p { margin: 1.2em 0; }
        .question-body label {
            display: block; margin: 12px 0 12px 25px; font-size: 1.15rem; cursor: pointer;
        }
        .question-body input[type="radio"] { width: 18px; height: 18px; margin-right: 12px; accent-color: #1e6fd9; }
        .question-body input[type="text"], .question-body input[type="number"], .question-body textarea {
            font-size: 1.1rem; padding: 12px 16px; border: 2px solid #cbd5e1;
            border-radius: 30px; width: 90%; max-width: 500px; margin-top: 8px;
            margin-bottom: 20px; background: white;
        }
        .question-body input:focus, .question-body textarea:focus {
            border-color: #1e6fd9; outline: none; box-shadow: 0 0 0 4px rgba(30,111,217,0.2);
        }
        .question-body .q-image { max-width: 100%; height: auto; border-radius: 16px; margin: 12px 0; }
        .question-body .opt-image { max-width: 60px; height: auto; border-radius: 8px; margin-right: 8px; vertical-align: middle; }
        .button-group { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .save-btn {
            background: #2a9d8f; color: white; border: none; font-size: 1.3rem;
            font-weight: 600; padding: 14px 28px; border-radius: 60px;
            cursor: pointer; box-shadow: 0 6px 12px rgba(42,157,143,0.4); transition: 0.1s;
        }
        .save-btn:hover { background: #1f7e72; }
        .save-flash { animation: flash 0.3s ease-in-out 4; }
        @keyframes flash {
            0% { background-color: #2a9d8f; }
            50% { background-color: #f4d03f; color: #1e2b37; }
            100% { background-color: #2a9d8f; }
        }
        .view-answer-btn {
            background: #b87333; color: white; border: none; font-size: 1.3rem;
            font-weight: 600; padding: 14px 28px; border-radius: 60px;
            cursor: pointer; box-shadow: 0 6px 12px rgba(184,115,51,0.4); transition: 0.1s;
        }
        .view-answer-btn:hover { background: #9e5f29; }
        .footer {
            background: #eef3f7; padding: 16px 28px; display: flex;
            justify-content: space-between; align-items: center; border-top: 2px solid #b8cadc; flex-wrap: wrap; gap: 15px;
        }
        .nav-btn {
            background: white; border: 2px solid #1e6fd9; color: #1e6fd9;
            font-size: 1.3rem; font-weight: 600; padding: 10px 30px; border-radius: 60px; cursor: pointer;
        }
        .nav-btn:hover:not(:disabled) { background: #1e6fd9; color: white; }
        .nav-btn:disabled { opacity: 0.35; border-color: #9aaebb; color: #7b8b9f; cursor: not-allowed; }
        .counter {
            font-size: 1.3rem; font-weight: 600; color: #1c3f5c;
            background: white; padding: 8px 32px; border-radius: 60px; border: 1px solid #bfd2e3;
        }
        .action-btns { display: flex; gap: 15px; }
        .action-btn {
            background: #1e6fd9; color: white; border: none; font-size: 1.2rem;
            font-weight: 600; padding: 12px 28px; border-radius: 60px; cursor: pointer;
            box-shadow: 0 6px 12px rgba(30,111,217,0.3);
        }
        .action-btn.orange { background: #c44536; }
        .action-btn:hover { filter: brightness(0.92); }
        .content::-webkit-scrollbar { width: 12px; }
        .content::-webkit-scrollbar-track { background: #eef3f8; }
        .content::-webkit-scrollbar-thumb { background: #9bb0c2; border-radius: 20px; border: 3px solid #eef3f8; }
        .admin-content::-webkit-scrollbar { width: 12px; }
        .admin-content::-webkit-scrollbar-track { background: #eef3f8; }
        .admin-content::-webkit-scrollbar-thumb { background: #9bb0c2; border-radius: 20px; border: 3px solid #eef3f8; }
    </style>
</head>
<body>

<!-- ─── 管理後台 ─── -->
<div id="adminPanel">
    <div class="admin-header">
        <h1>📋 管理後台</h1>
        <div style="display:flex;gap:12px;align-items:center;">
            <span id="adminStatus" style="font-size:1rem;opacity:0.8;">管理員</span>
            <button id="backToStudentBtn" style="background:rgba(255,255,255,0.15);color:white;border:2px solid rgba(255,255,255,0.3);padding:8px 20px;border-radius:30px;cursor:pointer;font-size:1rem;">返回學生登入</button>
        </div>
    </div>
    <div class="admin-body">
        <div class="admin-sidebar">
            <button class="admin-tab active" data-tab="bank">📚 題庫管理</button>
            <button class="admin-tab" data-tab="test">📝 出題設定</button>
            <button class="admin-tab" data-tab="results">📊 考試結果</button>
            <button class="admin-tab" data-tab="github">⚙️ GitHub</button>
        </div>
        <div class="admin-content">
            <!-- 題庫管理 -->
            <div id="tabBank" class="admin-tab-content active">
                <div class="toolbar">
                    <select id="bankFilter"><option value="all">全部題型</option><option value="image-choice">🖼️ 圖片選擇</option><option value="text-choice">📝 文字選擇</option><option value="short-answer">✏️ 簡答題</option><option value="fill-blank">🔤 填充題</option></select>
                    <span id="questionCount" style="font-weight:600;color:#1a4e6f;font-size:1rem;padding:0 8px;">0 題</span>
                    <button id="addQuestionBtn" class="btn-success">＋ 新增題目</button>
                    <button id="exportXLSXBtn" class="btn-success">📤 匯出 XLSX</button>
                    <button id="importXLSXBtn2" class="btn-success">📥 匯入 XLSX</button>
                    <button id="syncXLSXBtn" class="btn-success">🔄 從伺服器同步</button>
                    <input type="file" id="xlsxQFileInput" accept=".xlsx" style="display:none;">
                    <button id="resetBankBtn" class="btn-danger">重置題庫</button>
                </div>
                <table class="qb-table"><thead><tr><th>ID</th><th>題型</th><th>題目預覽</th><th>正確答案</th><th>操作</th></tr></thead><tbody id="bankTableBody"></tbody></table>
            </div>
            <!-- 出題設定 -->
            <div id="tabTest" class="admin-tab-content">
                <div class="config-section">
                    <h4>📄 試卷名稱</h4>
                    <input type="text" id="testConfigName" value="科學測驗卷" style="width:300px;padding:10px 16px;border:2px solid #b8cadc;border-radius:30px;font-size:1rem;">
                </div>
                <div class="config-section">
                    <h4>🔀 出題模式</h4>
                    <label style="margin-right:20px;"><input type="radio" name="testMode" value="auto" checked> 自動出題</label>
                    <label><input type="radio" name="testMode" value="manual"> 手動出題</label>
                </div>
                <div id="autoConfigSection" class="config-section">
                    <h4>⚙️ 自動出題設定</h4>
                    <div class="auto-row"><label>🖼️ 圖片選擇：</label><input type="number" id="autoImageChoice" value="3" min="0" max="50"> 題</div>
                    <div class="auto-row"><label>📝 文字選擇：</label><input type="number" id="autoTextChoice" value="5" min="0" max="50"> 題</div>
                    <div class="auto-row"><label>✏️ 簡答題：</label><input type="number" id="autoShortAnswer" value="2" min="0" max="50"> 題</div>
                    <div class="auto-row"><label>🔤 填充題：</label><input type="number" id="autoFillBlank" value="2" min="0" max="50"> 題</div>
                    <button id="previewAutoBtn" class="btn-success" style="padding:10px 24px;border:none;border-radius:30px;cursor:pointer;font-weight:600;color:white;font-size:1rem;margin-top:8px;">👁️ 預覽自動出題</button>
                </div>
                <div id="manualConfigSection" class="config-section" style="display:none;">
                    <h4>✋ 手動選擇題目</h4>
                    <div class="q-check-list" id="manualQuestionList"></div>
                </div>
                <div class="config-section">
                    <button id="saveTestConfigBtn" class="btn-success" style="padding:12px 28px;border:none;border-radius:30px;cursor:pointer;font-weight:600;color:white;font-size:1.1rem;">💾 儲存為當前試卷</button>
                    <span id="testConfigStatus" style="margin-left:16px;color:#1a4e6f;"></span>
                </div>
            </div>
            <!-- 考試結果 -->
            <div id="tabResults" class="admin-tab-content">
                <div class="toolbar">
                    <button id="importXLSXBtn" class="btn-success">📥 匯入學生 XLSX</button>
                    <button id="exportMasterBtn" class="btn-success">📤 匯出全班總表</button>
                    <button id="clearResultsBtn" class="btn-danger">🗑️ 清除所有紀錄</button>
                    <input type="file" id="xlsxFileInput" accept=".xlsx,.xls" style="display:none;" multiple>
                </div>
                <div class="results-summary" id="resultsSummary">
                    <div class="stat-card"><div class="num" id="resultCount">0</div><div class="label">已匯入學生</div></div>
                </div>
                <div id="resultsTableContainer"></div>
            </div>
            <!-- GitHub 設定 -->
            <div id="tabGithub" class="admin-tab-content">
                <div class="config-section">
                    <h4>🔑 GitHub Token</h4>
                    <p style="color:#5b7a94;font-size:0.9rem;margin-bottom:8px;">用於發佈題庫到 GitHub。需開啟 repo 的 Contents: write 權限。</p>
                    <input type="password" id="ghTokenInput" placeholder="github_pat_..." style="width:100%;padding:12px 16px;border:2px solid #b8cadc;border-radius:16px;font-size:1rem;">
                </div>
                <div class="config-section">
                    <h4>📦 倉儲名稱</h4>
                    <p style="color:#5b7a94;font-size:0.9rem;margin-bottom:8px;">例如：14211-star/science-quiz</p>
                    <input type="text" id="ghRepoInput" placeholder="username/repo" style="width:100%;padding:12px 16px;border:2px solid #b8cadc;border-radius:16px;font-size:1rem;">
                </div>
                <div class="config-section">
                    <h4>📄 題庫檔案路徑</h4>
                    <p style="color:#5b7a94;font-size:0.9rem;margin-bottom:8px;">預設為 questions.xlsx（放在 repo 根目錄）</p>
                    <input type="text" id="ghPathInput" value="questions.xlsx" style="width:100%;padding:12px 16px;border:2px solid #b8cadc;border-radius:16px;font-size:1rem;">
                </div>
                <div class="config-section" style="display:flex;gap:12px;flex-wrap:wrap;">
                    <button id="ghSaveBtn" class="btn-success" style="padding:12px 28px;border:none;border-radius:30px;cursor:pointer;font-weight:600;color:white;font-size:1.1rem;">💾 儲存設定</button>

            { id:22, type:'text-choice', title:'仙人掌', content:'<p>為甚麼仙人掌的葉子是尖刺狀？</p>', options:[{label:'A',value:'A',text:'減少營養流失'},{label:'B',value:'B',text:'增加吸引空氣中水分的機會'},{label:'C',value:'C',text:'減少水分流失'},{label:'D',value:'D',text:'怕太陽曬'}], correctAnswer:{q:'C'}, createdAt:Date.now() }

    function seedIfEmpty() {
        let qb = getQuestionBank();
        if (!qb || qb.length === 0) {
            saveQuestionBank(buildSeedQuestions());
            lsSet(LS_QID, 100);
        }
    }

    // ═══════════════════════════════════════════════════
    //  3. QUESTION BANK CRUD
    // ═══════════════════════════════════════════════════

    function addQuestion(q) {
        const qb = getQuestionBank();
        q.id = nextQid();
        q.createdAt = Date.now();
        qb.push(q);
        saveQuestionBank(qb);
        return q;
    }

    function updateQuestion(id, updates) {
        const qb = getQuestionBank();
        const idx = qb.findIndex(x => x.id === id);
        if (idx === -1) return false;
        qb[idx] = { ...qb[idx], ...updates, id: qb[idx].id, createdAt: qb[idx].createdAt };
        saveQuestionBank(qb);
        return true;
    }

    function deleteQuestion(id) {
        let qb = getQuestionBank();
        qb = qb.filter(x => x.id !== id);
        saveQuestionBank(qb);
    }

    function getQuestionsByType(type) {
        const qb = getQuestionBank();
        if (type === 'all') return qb;
        return qb.filter(x => x.type === type);
    }

    // ═══════════════════════════════════════════════════
    //  3b. XLSX EXPORT / IMPORT / SYNC (flat format)
    // ═══════════════════════════════════════════════════

    // Shared: parse XLSX rows into question bank (handles both old & new format)
    function parseQuestionsFromRows(rows) {
        const qb = [];
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (row[0] === undefined || row[0] === null || row[0] === '') continue;
            const q = {
                id: parseInt(row[0]) || (Date.now() + i),
                type: String(row[1] || 'text-choice').trim(),
                title: String(row[2] || '').trim(),
                content: String(row[3] || '').trim(),
                correctAnswer: { q: '' },
                createdAt: Date.now()
            };

            const col4 = row[4] ? String(row[4]).trim() : '';

            // Detect old format (col 4 is a JSON array string)
            if (col4.startsWith('[')) {
                try { q.options = JSON.parse(col4); } catch(e) {}
                if (row[5]) { try { q.correctAnswer = JSON.parse(row[5]); } catch(e) { q.correctAnswer = { q: String(row[5]).trim() }; } }
                if (row[6]) { try { q.multiAnswers = JSON.parse(row[6]); } catch(e) {} }
                if (row[7]) q.image = String(row[7]).trim();
            } else {
                // New flat format: col4=A, col5=B, col6=C, col7=D, col8=answer, col9=multi, col10=image
                const optLabels = 'ABCDEFGH';
                const opts = [];
                for (let j = 4; j <= 7; j++) {
                    const val = row[j] ? String(row[j]).trim() : '';
                    if (val) {
                        const label = optLabels[opts.length];
                        opts.push({ label, value: label, text: val, image: '' });
                    }
                }
                if (opts.length >= 2) q.options = opts;
                if (row[8]) q.correctAnswer = { q: String(row[8]).trim() };
                if (row[9]) {
                    const multi = String(row[9]).trim();
                    if (multi) q.multiAnswers = { q: multi.split('|').map(s => s.trim()).filter(Boolean) };
                }
                if (row[10]) q.image = String(row[10]).trim();
            }

            qb.push(q);
        }
        return qb;
    }

    function exportQuestionsXLSX() {
        const qb = getQuestionBank();
        const header = ['ID', '題型', '標題', '題目內容', '選項A', '選項B', '選項C', '選項D', '正確答案', '多組答案(|分隔)', '圖片網址'];
        const data = [header];
        qb.forEach(q => {
            const content = stripHtml(q.content).replace(/\s+/g, ' ').trim();
            const row = [q.id, q.type, q.title, content, '', '', '', '', '', '', q.image || ''];
            if (q.options && q.options.length > 0) {
                q.options.forEach((o, i) => { if (i < 4) row[4 + i] = o.text; });
            }
            const ans = q.correctAnswer ? Object.values(q.correctAnswer).filter(v => v).join(', ') : '';
            row[8] = ans;
            if (q.multiAnswers) {
                const vals = Array.isArray(q.multiAnswers) ? q.multiAnswers : Object.values(q.multiAnswers).flat();
                row[9] = vals.filter(Boolean).join('|');
            }
            data.push(row);
        });
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        ws['!cols'] = [{wch:5},{wch:16},{wch:24},{wch:50},{wch:16},{wch:16},{wch:16},{wch:16},{wch:16},{wch:24},{wch:40}];
        XLSX.utils.book_append_sheet(wb, ws, '題庫');
        XLSX.writeFile(wb, 'questions.xlsx');
    }

    function importQuestionsFromXLSX(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                if (rows.length < 2) { alert('XLSX 格式錯誤：沒有資料'); return; }
                const qb = parseQuestionsFromRows(rows);
                if (qb.length === 0) { alert('XLSX 中沒有找到題目'); return; }
                saveQuestionBank(qb);
                renderQuestionBankTable();
                alert(`✅ 成功匯入 ${qb.length} 題`);
            } catch(err) {
                alert('XLSX 解析失敗：' + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function syncFromServerXLSX() {
        const status = document.getElementById('testConfigStatus') || { textContent: '' };
        const origStatus = status.textContent;
        status.textContent = '🔄 正在同步...';
        status.style.color = '#1e6fd9';
        fetch('questions.xlsx')
            .then(resp => {
                if (!resp.ok) throw new Error('找不到 questions.xlsx (HTTP ' + resp.status + ')');
                return resp.arrayBuffer();
            })
            .then(buf => {
                const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                if (rows.length < 2) throw new Error('XLSX 中無題目資料');
                const qb = parseQuestionsFromRows(rows);
                if (qb.length === 0) throw new Error('匯入後無有效題目');
                saveQuestionBank(qb);
                renderQuestionBankTable();
                status.textContent = `✅ 同步成功！已載入 ${qb.length} 題`;
                status.style.color = '#2a9d8f';
                setTimeout(() => { if (status.textContent.includes('同步成功')) status.textContent = origStatus; }, 3000);
            })
            .catch(err => {
                status.textContent = '❌ ' + err.message;
                status.style.color = '#c44536';
                setTimeout(() => { if (status.textContent.includes(err.message)) status.textContent = origStatus; }, 4000);
            });
    }

        const el = document.getElementById('ghStatus');

    async function publishToGithub() {
        const gh = getGithubSettings();
        if (!gh.token || !gh.repo) { showGhStatus('❌ 請先儲存 GitHub 設定', '#c44536'); return; }
        showGhStatus('🔄 正在產生題庫並上傳...', '#1e6fd9');

        // Generate XLSX
        const qb = getQuestionBank();
        const header = ['ID', '題型', '標題', '題目內容', '選項A', '選項B', '選項C', '選項D', '正確答案', '多組答案(|分隔)', '圖片網址'];
        const data = [header];
        qb.forEach(q => {
            const content = stripHtml(q.content).replace(/\s+/g, ' ').trim();
            const row = [q.id, q.type, q.title, content, '', '', '', '', '', '', q.image || ''];
            if (q.options) q.options.forEach((o, i) => { if (i < 4) row[4 + i] = o.text; });
            const ans = q.correctAnswer ? Object.values(q.correctAnswer).filter(v => v).join(', ') : '';
            row[8] = ans;
            if (q.multiAnswers) {
                const vals = Array.isArray(q.multiAnswers) ? q.multiAnswers : Object.values(q.multiAnswers).flat();
                row[9] = vals.filter(Boolean).join('|');
            }
            data.push(row);
        });
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        ws['!cols'] = [{wch:5},{wch:16},{wch:24},{wch:50},{wch:16},{wch:16},{wch:16},{wch:16},{wch:16},{wch:24},{wch:40}];
        XLSX.utils.book_append_sheet(wb, ws, '題庫');
        const xlsxBase64 = XLSX.write(wb, { type: 'base64' });

        try {
            // Check if file exists
            const getUrl = 'https://api.github.com/repos/' + gh.repo + '/contents/' + gh.path;
            let sha = '';
            const getResp = await fetch(getUrl, {
                headers: { Authorization: 'Bearer ' + gh.token, Accept: 'application/vnd.github.v3+json' }
            });
            if (getResp.ok) {
                const existing = await getResp.json();
                sha = existing.sha;
            }

            // Upload file
            const body = { message: 'Update question bank via TIMSS admin', content: xlsxBase64, sha: sha || undefined };
            const putResp = await fetch(getUrl, {
                method: 'PUT',
                headers: { Authorization: 'Bearer ' + gh.token, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!putResp.ok) {
                const err = await putResp.json();
                throw new Error(err.message || 'HTTP ' + putResp.status);
            }
            const result = await putResp.json();
            showGhStatus('✅ 發佈成功！' + result.content.path + '（已更新 ' + qb.length + ' 題）<br>🕐 GitHub Pages 約 1-2 分鐘後自動更新', '#2a9d8f');
        } catch(e) {
            showGhStatus('❌ 發佈失敗：' + e.message, '#c44536');
        }
    }

    async function syncFromGithub() {
        const gh = getGithubSettings();
        if (!gh.token || !gh.repo) { showGhStatus('❌ 請先儲存 GitHub 設定', '#c44536'); return; }
        showGhStatus('🔄 正在從 GitHub 下載題庫...', '#1e6fd9');

        try {
            const url = 'https://api.github.com/repos/' + gh.repo + '/contents/' + gh.path;
            const resp = await fetch(url, {
                headers: { Authorization: 'Bearer ' + gh.token, Accept: 'application/vnd.github.v3+json' }
            });
            if (!resp.ok) throw new Error('找不到檔案 (HTTP ' + resp.status + ')');
            const data = await resp.json();
            const base64 = data.content.replace(/\n/g, '');
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const wb = XLSX.read(bytes, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
            if (rows.length < 2) throw new Error('XLSX 中無資料');
            const qb = parseQuestionsFromRows(rows);
            if (qb.length === 0) throw new Error('無有效題目');
            saveQuestionBank(qb);
            renderQuestionBankTable();
            showGhStatus('✅ 同步成功！已從 GitHub 下載 ' + qb.length + ' 題', '#2a9d8f');
        } catch(e) {
            showGhStatus('❌ 同步失敗：' + e.message, '#c44536');
        }
    }

            const answerVal = document.getElementById('mqAnswer').value.trim();
            const correctAnswer = { q: answerVal };

            const question = { title, type, content, correctAnswer, createdAt: Date.now() };

            // handle main image URL
            const imgUrl = document.getElementById('mqImageUrl').value.trim();
            if (imgUrl) question.image = imgUrl;
            else if (existing && existing.image) question.image = existing.image;

            // handle options with optional image URLs
            if (type === 'image-choice' || type === 'text-choice') {
                const optRows = document.querySelectorAll('#mqOptionsContainer .modal-option-row');
                const labels = 'ABCDEFGH';
                const opts = [];
                for (let i = 0; i < optRows.length; i++) {

            if (type === 'fill-blank') {
                const ma = document.getElementById('mqMultiAnswers').value.trim();
                if (ma) question.multiAnswers = { q: ma.split(',').map(s => s.trim()).filter(Boolean) };

            if (existing) updateQuestion(id, question);
            else addQuestion(question);
            modal.remove();
            renderQuestionBankTable();
        });

    function saveCurrentTestConfig() {
        const mode = document.querySelector('input[name="testMode"]:checked').value;
        const name = document.getElementById('testConfigName').value.trim() || '未命名試卷';
        let config = { name, mode, questionIds: [], autoConfig: null };

            config.autoConfig = {

    function parseStudentXLSX(data) {
        try {
            const wb = XLSX.read(data, { type: 'array' });
            // Try to find detailed sheet
            let sheetName = wb.SheetNames[0];
            for (const sn of wb.SheetNames) {
                if (sn.includes('明細') || sn.includes('詳細')) { sheetName = sn; break; }
            }
            const ws = wb.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
            if (rows.length < 2) return null;
            const firstRow = rows[0] || [];
            if (firstRow[0] === '班級' && firstRow[1] === '姓名') {
                const dataRows = rows.slice(1);
                if (dataRows.length === 0) return null;
                const r0 = dataRows[0];
                const className = String(r0[0] || '').trim();
                const name = String(r0[1] || '').trim();
                const sid = String(r0[2] || '').trim();
                if (!name) return null;
                let correct = 0, total = 0;
                dataRows.forEach(row => {
                    if (!row[0]) return;
                    total++;
                    if (String(row[7] || '').includes('✔️')) correct++;
                });
                return { className, name, id: sid, correct, total };
            }
            // Fallback: old format
            if (rows.length < 4) return null;
            const className = String(rows[0]?.[1] || '').trim();
            const name = String(rows[1]?.[1] || '').trim();
            const sid = String(rows[2]?.[1] || '').trim();
            if (!name) return null;
            let correct = 0, total = 0;
            for (let i = 5; i < rows.length; i++) {
                const row = rows[i];
                if (!row[0]) continue;
                total++;
                if (String(row[3] || '').includes('✔️')) correct++;
            }
            return { className, name, id: sid, correct, total };
        } catch(e) { return null; }
    }

    function handleImportXLSX(files) {
        const results = getResults();
        let imported = 0;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const parsed = parseStudentXLSX(data);
                if (parsed) {
                    const exists = results.findIndex(r => r.name === parsed.name && r.className === parsed.className);
                    if (exists >= 0) results[exists] = parsed;
                    else results.push(parsed);
                    saveResults(results);
                    renderResultsView();
                    imported++;
                }
            };
            reader.readAsArrayBuffer(file);
        });
        setTimeout(() => {
            if (imported > 0) alert(`成功匯入 ${imported} 位學生`);
        }, 500);
    }

    function generateMasterXLSX() {
        const results = getResults();
        if (results.length === 0) { alert('目前沒有學生資料'); return; }

        // Sheet 1: 總表（一學生一列）
        const header1 = ['班級', '姓名', '學號', '答對題數', '總題數', '正確率'];
        const data1 = [header1];
        results.forEach(r => {
            const rate = r.total > 0 ? Math.round(r.correct / r.total * 100) + '%' : '0%';
            data1.push([r.className, r.name, r.id, r.correct, r.total, rate]);
        });

        // Sheet 2: 逐題分析
        const data2 = [['題號', '題型', '正確答案', '答對人數', '答對率']];

        // Sheet 3: 明細（由各學生原始資料合併）
        const data3 = [['班級', '姓名', '學號', '題號', '學生答案', '正確答案', '是否正確']];

        const wb = XLSX.utils.book_new();
        const ws1 = XLSX.utils.aoa_to_sheet(data1);
        XLSX.utils.book_append_sheet(wb, ws1, '成績一覽表');
        const ws2 = XLSX.utils.aoa_to_sheet(data2);
        XLSX.utils.book_append_sheet(wb, ws2, '逐題分析');
        const ws3 = XLSX.utils.aoa_to_sheet(data3);
        XLSX.utils.book_append_sheet(wb, ws3, '詳細明細');

        const now = new Date();
        const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
        XLSX.writeFile(wb, `全班總表_${ts}.xlsx`);
    }

    function initStudentTest() {
        const tc = getTestConfig();
        let qIds = [];
        if (tc && tc.questionIds && tc.questionIds.length > 0) {
            qIds = tc.questionIds;
        } else {
            const qb = getQuestionBank();
            qIds = qb.map(q => q.id);
        }

        const qb = getQuestionBank();
        const qMap = {};
        qb.forEach(q => qMap[q.id] = q);
        questions = qIds.map(id => qMap[id]).filter(Boolean);
        questions = shuffleArray(questions);
        totalQuestions = questions.length;
        if (totalQuestions === 0) {
            questionPanel.innerHTML = '<div class="question-body"><p style="text-align:center;padding:40px;color:#7b8b9f;">📭 目前沒有試卷題目<br>請老師先到管理後台設定試卷。</p></div>';
            counterEl.innerText = '0 / 0';
            gridContainer.innerHTML = '';
            document.getElementById('generateXLSXBtn').style.display = 'none';
            document.getElementById('emailBtn').style.display = 'none';
            return;
        }
        document.getElementById('generateXLSXBtn').style.display = '';
        document.getElementById('emailBtn').style.display = '';
        currentIndex = 0;
        answered = new Array(totalQuestions).fill(false);
        answersStore = new Array(totalQuestions).fill(null).map(() => ({}));
        testEnded = false;
        timeLeft = 36 * 60;
        timerEl.innerText = '36:00';

        renderNavButtons();
        renderCurrentQuestion();
        startTimer();
    }

    function renderNavButtons() {
        let html = '';
        for (let i = 0; i < totalQuestions; i++) {
            let cls = 'q-btn';
            if (answered[i]) cls += ' done';
            else if (i === currentIndex) cls += ' current';
            else cls += ' todo';
            html += `<button class="${cls}" data-index="${i}">${i+1}</button>`;
        }
        gridContainer.innerHTML = html;
        document.querySelectorAll('.q-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (testEnded) return;
                const idx = parseInt(this.dataset.index);
                if (!isNaN(idx) && idx !== currentIndex) changeQuestion(idx);
            });
        });
    }

    function updateNavStyles() {
        const btns = document.querySelectorAll('.q-btn');
        btns.forEach((btn, i) => {
            btn.classList.remove('done', 'current', 'todo');
            if (answered[i]) btn.classList.add('done');
            else if (i === currentIndex) btn.classList.add('current');
            else btn.classList.add('todo');
        });
    }

    function renderCurrentQuestion() {
        const q = questions[currentIndex];
        if (!q) return;
        const stored = answersStore[currentIndex] || {};

        // Build HTML based on question type
        let bodyHtml = '';

        if (q.type === 'image-choice' || q.type === 'text-choice') {
            bodyHtml += q.content;
            // Show question image for image-choice
            if (q.image) {
                bodyHtml += `<img src="${q.image}" class="q-image" alt="題目圖片">`;
            }
            if (q.options) {
                q.options.forEach(o => {
                    const checked = stored.q === o.value ? 'checked' : '';
                    let optHtml = '';
                    if (o.image) optHtml += `<img src="${o.image}" class="opt-image" alt="">`;
                    optHtml += ` ${o.label}. ${o.text}`;
                    bodyHtml += `<label><input type="radio" name="q" value="${o.value}" ${checked}> ${optHtml}</label>`;
                });
            }
        } else if (q.type === 'fill-blank') {
            bodyHtml += q.content;
            // Replace text inputs - need to restore stored values
            const temp = document.createElement('div');
            temp.innerHTML = q.content;
            temp.querySelectorAll('input, textarea').forEach(inp => {
                const name = inp.getAttribute('name');
                if (name && stored[name] !== undefined) inp.value = stored[name];
            });
            bodyHtml = temp.innerHTML;
        } else if (q.type === 'short-answer') {
            bodyHtml += q.content;
            const temp = document.createElement('div');
            temp.innerHTML = q.content;
            temp.querySelectorAll('input, textarea').forEach(inp => {
                const name = inp.getAttribute('name');
                if (name && stored[name] !== undefined) inp.value = stored[name];
            });
            bodyHtml = temp.innerHTML;
        }

        bodyHtml += `<div class="button-group">
            <button class="save-btn" id="saveCurrentBtn">📌 儲存本題答案</button>
            <button class="view-answer-btn" id="viewAnswerBtn">🔍 查看答案</button>
        </div>`;

        questionPanel.innerHTML = `<div class="question-body" id="questionBody_${currentIndex}">${bodyHtml}</div>`;

        // Restore values
        if (Object.keys(stored).length > 0) {
            const body = document.getElementById('questionBody_' + currentIndex);
            Object.keys(stored).forEach(key => {
                const input = body.querySelector(`[name="${key}"]`);
                if (!input) return;
                if (input.type === 'radio') {
                    const radio = body.querySelector(`[name="${key}"][value="${stored[key]}"]`);
                    if (radio) radio.checked = true;
                } else {
                    input.value = stored[key];
                }
            });
        }

        // Save button
        document.getElementById('saveCurrentBtn').addEventListener('click', saveCurrentAnswer);
        // View answer button (password 378)
        document.getElementById('viewAnswerBtn').addEventListener('click', function() {
            const pwd = prompt('請輸入查看答案密碼：');
            if (pwd === '378') {

                let msg = '本題正確答案：\n';
                for (let [k, v] of Object.entries(ca)) {
                    msg += `${k} : ${v}\n`;
                }
                if (!msg.includes(':') || Object.keys(ca).length === 0) msg = '本題為自由發揮，無標準答案';
                alert(msg);
            } else {
                alert('密碼錯誤');
            }
        });

        counterEl.innerText = `${currentIndex+1} / ${totalQuestions}`;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === totalQuestions - 1;
    }

    // ═══════════════════════════════════════════════════
    //  8. ANSWER CHECKING & XLSX (optimized)
    // ═══════════════════════════════════════════════════

    function isAnswerCorrect(qIdx, studentAns, question) {
        if (!studentAns || Object.keys(studentAns).length === 0) return false;
        const correctAns = question.correctAnswer || {};
        const multiAns = question.multiAnswers || null;
        let allMatch = true;
        for (let key in correctAns) {
            const correctVal = correctAns[key].toString().trim();
            const studentVal = (studentAns[key] || '').toString().trim();
            if (correctVal === '' && question.type === 'short-answer') continue;
            // Check multi-answers for fill-blank
            if (multiAns && multiAns[key] && Array.isArray(multiAns[key])) {
                if (!multiAns[key].map(a => a.trim().toLowerCase()).includes(studentVal.toLowerCase())) {
                    allMatch = false;
                    break;
                }
            } else {
                if (studentVal.toLowerCase() !== correctVal.toLowerCase()) {
                    allMatch = false;
                    break;
                }
            }
        }
        return allMatch;
    }

    function generateOptimizedXLSX() {
        // Sheet 1: 成績一覽表 (pivot, one row per student)
        const qb = getQuestionBank();
        const qMap = {};
        qb.forEach(q => qMap[q.id] = q);

        const header1 = ['班級', '姓名', '學號'];
        const qIndices = [];
        questions.forEach((q, idx) => {
            header1.push(`第${idx+1}題`);
            qIndices.push(idx);
        });
        header1.push('答對題數', '總分');

        const row1 = ['班級', '姓名', '學號'];
        questions.forEach((q, idx) => {
            const ca = q.correctAnswer || {};
            const vals = Object.values(ca).filter(v => v !== '').join('/');
            row1.push(vals || '自由');
        });
        row1.push('—', '—');

        const data1 = [header1, row1];

        let correctCount = 0;
        const row = [studentInfo.className, studentInfo.name, studentInfo.id];
        questions.forEach((q, idx) => {
            const sa = answersStore[idx] || {};
            const isCorrect = isAnswerCorrect(idx, sa, q);
            if (isCorrect) correctCount++;
            const ansVal = Object.values(sa).filter(v => v).join('/') || '未答';
            row.push(`${ansVal} ${isCorrect ? '✅' : '❌'}`);
        });
        row.push(correctCount, `${correctCount}/${totalQuestions}`);
        data1.push(row);

        // Sheet 2: 逐題分析
        const data2 = [['題號', '題型', '正確答案', '學生答案', '是否正確']];
        questions.forEach((q, idx) => {
            const sa = answersStore[idx] || {};
            const ca = q.correctAnswer || {};
            const ansVal = Object.values(sa).filter(v => v).join('/') || '未答';
            const corVal = Object.values(ca).filter(v => v !== '').join('/') || '自由';
            const isCorrect = isAnswerCorrect(idx, sa, q);
            data2.push([`第${idx+1}題`, TYPE_LABELS[q.type] || q.type, corVal, ansVal, isCorrect ? '✔️正確' : '❌錯誤']);
        });

        // Sheet 3: 詳細明細 (same as original format)
        const data3 = [['班級', '姓名', '學號', '題號', '題型', '學生答案', '正確答案', '是否正確']];
        questions.forEach((q, idx) => {
            const sa = answersStore[idx] || {};
            const ca = q.correctAnswer || {};
            const studentStr = Object.entries(sa).map(([k, v]) => `${k}:${v}`).join('; ') || '未作答';
            const correctStr = Object.entries(ca).map(([k, v]) => `${k}:${v}`).join('; ') || '無';
            const isCorrect = isAnswerCorrect(idx, sa, q) ? '✔️正確' : '❌錯誤';
            data3.push([studentInfo.className, studentInfo.name, studentInfo.id, `第${idx+1}題`, TYPE_LABELS[q.type] || q.type, studentStr, correctStr, isCorrect]);
        });

        const wb = XLSX.utils.book_new();
        const ws1 = XLSX.utils.aoa_to_sheet(data1);
        XLSX.utils.book_append_sheet(wb, ws1, '成績一覽表');
        const ws2 = XLSX.utils.aoa_to_sheet(data2);
        XLSX.utils.book_append_sheet(wb, ws2, '逐題分析');
        const ws3 = XLSX.utils.aoa_to_sheet(data3);
        XLSX.utils.book_append_sheet(wb, ws3, '詳細明細');

        const fileName = `${studentInfo.className}_${studentInfo.name}_${studentInfo.id}_科學_批改.xlsx`;
        XLSX.writeFile(wb, fileName);
    }

    generateBtn.addEventListener('click', function() {
        if (!studentInfo.name) { alert('學生資訊遺失，請重新登入'); return; }
        if (totalQuestions === 0) { alert('目前沒有題目，請聯繫老師'); return; }

    });

    emailBtn.addEventListener('click', function() {
        const subject = `科學答案 ${studentInfo.className}班 ${studentInfo.name} ${studentInfo.id}`;
        const lines = [`班級：${studentInfo.className}`, `姓名：${studentInfo.name}`, `學號：${studentInfo.id}`, ''];
        lines.push('各題答案概要（詳見附檔批改）：');
        for (let i = 0; i < totalQuestions; i++) {
            const ans = answersStore[i];
            lines.push(`第${i+1}題：${Object.values(ans).join(' / ') || '未儲存'}`);
        }
        lines.push('', '— 請將產生的 XLSX 檔案作為附件寄出。');
        window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(lines.join('\n'))}`;
    });

    // ─── Timer cleanup ───
    window.addEventListener('beforeunload', () => {
        if (timerInterval) clearInterval(timerInterval);
    });

    // ═══════════════════════════════════════════════════
    //  9. INIT
    // ═══════════════════════════════════════════════════

    seedIfEmpty();

    // Auto-fetch questions.xlsx from server (GitHub Pages support)
    fetch('questions.xlsx')
        .then(resp => resp.ok ? resp.arrayBuffer() : Promise.reject())
        .then(buf => {
            const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
            if (rows.length < 2) return;
            const qb = parseQuestionsFromRows(rows);
            if (qb.length > 0) {
                saveQuestionBank(qb);
                if (document.getElementById('adminPanel').style.display === 'flex' && typeof renderQuestionBankTable === 'function') {
                    renderQuestionBankTable();
                }
            }
        })
        .catch(() => {});

    // Check for ?mode=admin
    if (window.location.search.includes('mode=admin')) {
        showAdminPwdDialog();
    }

    // Restore test config status display
    const tc = getTestConfig();
    if (tc) {
        document.getElementById('testConfigStatus').textContent = `當前試卷：${tc.name} (${tc.questionIds.length} 題)`;
    }

    console.log('✅ TIMSS 測驗系統已啟動');
    console.log('   📚 題庫題數:', getQuestionBank().length);
    console.log('   📝 當前試卷:', tc ? `${tc.name} (${tc.questionIds.length} 題)` : '未設定');
    console.log('   📤 管理後台: 雙擊標題或 ?mode=admin');
    console.log('   📊 題庫同步: 放 questions.xlsx 到網站目錄即可自動載入');

})();
</script>
</body>
</html>
